<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر واحد لكل اللي تحتاجيه</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* البحث */
.searchBox{
padding:15px;
background:#111;
}

.searchBox input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

/* الاقسام */
.categories{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
background:#111;
}

.categories button{
background:#1a1a1a;
color:white;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.categories button:hover{
background:#00ff9c;
color:black;
}

/* المنتجات */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.product{
background:#1a1a1a;
border-radius:15px;
padding:15px;
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
margin-bottom:8px;
}

/* السعر */
.price{
color:#ffffff;
font-size:20px;
font-weight:bold;
margin-top:10px;
}

/* الشحن المجاني */
.free{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
color:#00ff66;
font-size:22px;
font-weight:900;
margin:8px 0 12px 0;
}

/* ايقونة التوصيل */
.free span{
font-size:26px;
}

/* الازرار */
button{
background:#00ff9c;
color:black;
border:none;
padding:10px;
width:100%;
border-radius:8px;
margin-top:6px;
cursor:pointer;
font-weight:bold;
}

.addBtn{
position:fixed;
bottom:90px;
right:20px;
background:#007bff;
color:white;
padding:14px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

/* زر واتساب */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px 16px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

/* فورم الادمن */
.formBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<header>متجر واحد لكل اللي تحتاجيه في مكان واحد. 🛍️</header>

<div class="searchBox">
<input type="text" id="searchInput" placeholder="ابحثي عن المنتج..." onkeyup="searchProducts()">
</div>

<div class="categories">
<button onclick="filter('all')">كل المنتجات</button>
<button onclick="filter('شنط خرز')">شنط خرز</button>
<button onclick="filter('ترندات')">ترندات</button>
<button onclick="filter('فوانيس خرز')">فوانيس خرز</button>
</div>

<div class="products" id="products"></div>

<div class="addBtn" onclick="openLogin()">+</div>

<a class="whatsapp" href="https://wa.me/201091007426">واتساب</a>

<!-- تسجيل دخول الادمن -->
<div class="formBox" id="loginBox">
<h3>كلمة السر</h3>
<input type="password" id="pass">
<button onclick="login()">دخول</button>
</div>

<!-- إضافة منتج -->
<div class="formBox" id="addBox">
<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر بالريال">

<select id="category">
<option value="شنط خرز">شنط خرز</option>
<option value="ترندات">ترندات</option>
<option value="فوانيس خرز">فوانيس خرز</option>
</select>

<input id="img1" placeholder="رابط الصورة 1">
<input id="img2" placeholder="رابط الصورة 2">
<input id="video" placeholder="رابط الفيديو (اختياري)">

<button onclick="addProduct()">إضافة المنتج</button>
</div>

<script>

let password = "esraa2026";
let products = JSON.parse(localStorage.getItem("products") || "[]");
let currentFilter = "all";

function showProducts(){
let box = "";
let searchValue = document.getElementById("searchInput").value.toLowerCase();

products.forEach((p,index)=>{

if(currentFilter !== "all" && p.category !== currentFilter) return;
if(!p.name.toLowerCase().includes(searchValue)) return;

box += `
<div class="product">
<img src="${p.img1}">
<h3>${p.name}</h3>

<div class="price">${p.price} ريال</div>

<div class="free">
<span>🚚</span>
الشحن مجانًا
</div>

<p>${p.category}</p>

<button onclick="viewProduct(${index})">عرض المنتج</button>
<button onclick="deleteProduct(${index})">حذف المنتج</button>
</div>`;
});

document.getElementById("products").innerHTML = box;
}

showProducts();

function searchProducts(){
showProducts();
}

function filter(cat){
currentFilter = cat;
showProducts();
}

function openLogin(){
document.getElementById("loginBox").style.display="block";
}

function login(){
let userPass = document.getElementById("pass").value;
if(userPass === password){
document.getElementById("loginBox").style.display="none";
document.getElementById("addBox").style.display="block";
}else{
alert("كلمة السر غلط");
}
}

function addProduct(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let category = document.getElementById("category").value;
let img1 = document.getElementById("img1").value;
let img2 = document.getElementById("img2").value;
let video = document.getElementById("video").value;

products.push({name,price,category,img1,img2,video});
localStorage.setItem("products", JSON.stringify(products));

showProducts();
document.getElementById("addBox").style.display="none";
}

function deleteProduct(index){
let pass = prompt("اكتبي كلمة السر");
if(pass === password){
products.splice(index,1);
localStorage.setItem("products", JSON.stringify(products));
showProducts();
}else{
alert("كلمة السر غلط");
}
}

function viewProduct(index){
let p = products[index];

document.body.innerHTML = `
<header>${p.name}</header>

<div style="padding:20px">
<img src="${p.img1}" style="width:100%">
${p.img2 ? `<img src="${p.img2}" style="width:100%;margin-top:10px">` : ""}

<h2>${p.name}</h2>
<div class="price">${p.price} ريال</div>

<div class="free">
<span>🚚</span>
الشحن مجانًا
</div>

<p>${p.category}</p>

${p.video ? `<video controls style="width:100%;margin-top:10px;"><source src="${p.video}"></video>` : ""}

<button onclick="goBack()">رجوع للمتجر</button>
</div>
`;
}

function goBack(){location.reload();}

</script>

</body>
</html>
