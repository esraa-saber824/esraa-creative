<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esraa creative</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff;
padding-bottom:90px;
}

/* العنوان */
header{
background:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #eee;
}

/* الأقسام */
.categories{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
background:#fafafa;
}

.categoryBox{
padding:8px 14px;
background:white;
border:1px solid #eee;
border-radius:20px;
cursor:pointer;
font-size:14px;
white-space:nowrap;
}

.categoryBox.active{
background:black;
color:white;
}

/* المنتجات جنب بعض */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.product{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 0 8px rgba(0,0,0,0.05);
cursor:pointer;
position:relative;
}

.product img{
width:100%;
border-radius:10px;
}

.product h4{
margin:8px 0 5px;
font-size:15px;
}

/* الخصم */
.discount{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
padding:4px 8px;
font-size:12px;
border-radius:6px;
}

.oldPrice{
text-decoration:line-through;
color:#888;
font-size:13px;
}

.price{
color:black;
font-size:16px;
font-weight:bold;
}

/* زر الإضافة */
.addBtn{
position:fixed;
bottom:80px;
right:15px;
background:black;
color:white;
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
cursor:pointer;
}

/* زر الحذف */
.deleteBtn{
position:fixed;
bottom:140px;
right:15px;
background:red;
color:white;
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

/* شريط تحت */
.bottomBar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.bottomBar div{
font-size:15px;
cursor:pointer;
}

/* صفحة المنتج */
.productPage{
display:none;
padding:15px;
}

.productPage img{
width:100%;
border-radius:12px;
}

.qtyBox{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qtyBox button{
width:35px;
height:35px;
font-size:18px;
border:none;
background:black;
color:white;
border-radius:8px;
}

.orderBtn{
margin-top:15px;
width:100%;
background:#25D366;
color:white;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

</style>
</head>
<body>

<header>Esraa creative</header>

<!-- الأقسام -->
<div class="categories">
<div class="categoryBox active" onclick="filterCategory('all',this)">الكل</div>
<div class="categoryBox" onclick="filterCategory('تريندات',this)">تريندات</div>
<div class="categoryBox" onclick="filterCategory('هاند ميد',this)">هاند ميد</div>
<div class="categoryBox" onclick="filterCategory('خمارات',this)">خمارات</div>
<div class="categoryBox" onclick="filterCategory('عبايات',this)">عبايات</div>
</div>

<!-- المنتجات -->
<div class="products" id="products"></div>

<!-- صفحة المنتج -->
<div class="productPage" id="productPage">
<img id="pImg">
<h3 id="pName"></h3>
<div id="pPrice"></div>

<div class="qtyBox">
<button onclick="minusQty()">-</button>
<div id="qty">1</div>
<button onclick="plusQty()">+</button>
</div>

<button class="orderBtn" onclick="sendToWhatsApp()">إرسال الطلب على واتساب</button>
</div>

<!-- زر الإضافة -->
<div class="addBtn" onclick="addProduct()">+</div>

<!-- زر الحذف -->
<div class="deleteBtn" onclick="deleteProduct()">🗑️</div>

<!-- شريط تحت -->
<div class="bottomBar">
<div onclick="showStore()">المتجر</div>
<div onclick="showCart()">حقيبة التسوق</div>
</div>

<script>

/* البيانات */
let products = JSON.parse(localStorage.getItem("products") || "[]");
let selectedCategory = "all";
let selectedProduct = {};
let quantity = 1;

/* عرض المنتجات */
function showProducts(){

let box="";

products.forEach(p=>{

if(selectedCategory!=="all" && p.category!==selectedCategory) return;

let discount = p.oldPrice ? Math.round((p.oldPrice-p.price)/p.oldPrice*100) : null;

box+=`
<div class="product" onclick="openProduct('${p.name}','${p.price}','${p.oldPrice}','${p.img}')">

${discount?`<div class="discount">خصم ${discount}%</div>`:""}

<img src="${p.img}">
<h4>${p.name}</h4>

${p.oldPrice?`<div class="oldPrice">${p.oldPrice} ريال</div>`:""}
<div class="price">${p.price} ريال</div>

</div>
`;
});

document.getElementById("products").innerHTML=box;
}

showProducts();

/* الفلتر */
function filterCategory(cat,el){

selectedCategory = cat;

document.querySelectorAll(".categoryBox").forEach(c=>c.classList.remove("active"));
el.classList.add("active");

showProducts();
}

/* إضافة منتج */
function addProduct(){

let pass = prompt("كلمة السر:");
if(pass!=="esraa2026") return;

let name = prompt("اسم المنتج:");
let price = prompt("السعر:");
let oldPrice = prompt("السعر قبل الخصم:");
let category = prompt("القسم:");
let img = prompt("رابط الصورة:");

products.push({name,price,oldPrice,category,img});
localStorage.setItem("products",JSON.stringify(products));
showProducts();
}

/* حذف منتج */
function deleteProduct(){

let pass = prompt("كلمة السر:");
if(pass!=="esraa2026") return;

let list="اختاري رقم المنتج:\n";

products.forEach((p,i)=>list+=`${i+1}- ${p.name}\n`);

let choice = parseInt(prompt(list))-1;

if(choice>=0){
products.splice(choice,1);
localStorage.setItem("products",JSON.stringify(products));
showProducts();
}

}

/* فتح المنتج */
function openProduct(name,price,oldPrice,img){

selectedProduct = {name,price,oldPrice,img};
quantity=1;
document.getElementById("qty").innerText=quantity;

document.getElementById("pImg").src=img;
document.getElementById("pName").innerText=name;
document.getElementById("pPrice").innerText=price+" ريال";

document.getElementById("productPage").style.display="block";
window.scrollTo(0,0);
}

/* الكمية */
function plusQty(){
quantity++;
document.getElementById("qty").innerText=quantity;
}

function minusQty(){
if(quantity>1){
quantity--;
document.getElementById("qty").innerText=quantity;
}
}

/* إرسال واتساب */
function sendToWhatsApp(){

let msg = 
"طلب جديد من متجر Esraa creative \n\n"+
"المنتج: "+selectedProduct.name+"\n"+
"السعر: "+selectedProduct.price+" ريال\n"+
"الكمية: "+quantity;

window.open("https://wa.me/201091007426?text="+encodeURIComponent(msg));
}

/* المتجر */
function showStore(){
document.getElementById("productPage").style.display="none";
}

/* السلة */
function showCart(){
alert("السلة جاهزة نضيفها في الخطوة الجاية 💖");
}

</script>

</body>
  </html>
