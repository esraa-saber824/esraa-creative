<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esraa creative</title>

<style>
body{margin:0;font-family:Arial;background:#fff;}
header{background:white;padding:15px;text-align:center;font-size:20px;font-weight:bold;border-bottom:1px solid #eee;}

.categories{display:flex;overflow-x:auto;gap:10px;padding:10px;background:#fafafa;}
.categoryBox{padding:8px 14px;background:white;border:1px solid #eee;border-radius:20px;cursor:pointer;}
.categoryBox.active{background:black;color:white;}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px;}
.product{background:white;border-radius:12px;padding:10px;box-shadow:0 0 8px rgba(0,0,0,0.05);cursor:pointer;position:relative;}
.product img{width:100%;border-radius:10px;}
.product h4{margin:8px 0 5px;font-size:15px;}

.discount{position:absolute;top:8px;right:8px;background:red;color:white;padding:3px 6px;font-size:12px;border-radius:6px;}

.productPage{display:none;padding:15px;}
.productPage img{width:100%;border-radius:12px;}

.oldPrice{color:#888;text-decoration:line-through;}
.discountText{color:red;font-size:14px;}

.qtyBox{display:flex;gap:10px;margin-top:10px;}
.qtyBox button{width:35px;height:35px;background:black;color:white;border:none;border-radius:8px;}

.orderBtn{margin-top:15px;width:100%;background:#25D366;color:white;padding:12px;border:none;border-radius:10px;}

.backBtn{margin-bottom:10px;background:#eee;padding:8px;border:none;border-radius:8px;}

.addBtn,.deleteBtn{
position:fixed;right:15px;width:50px;height:50px;border-radius:50%;
display:flex;align-items:center;justify-content:center;color:white;font-size:22px;cursor:pointer;
}
.addBtn{bottom:90px;background:#25D366;}
.deleteBtn{bottom:150px;background:red;}
</style>
</head>

<body>

<header>Esraa creative 💖</header>

<!-- الصفحة الرئيسية -->
<div id="mainPage">

<div class="categories">
<div class="categoryBox active" onclick="filterCategory('all',this)">الكل</div>
<div class="categoryBox" onclick="filterCategory('تريندات',this)">تريندات</div>
<div class="categoryBox" onclick="filterCategory('هاند ميد',this)">هاند ميد</div>
<div class="categoryBox" onclick="filterCategory('عبايات',this)">عبايات</div>
<div class="categoryBox" onclick="filterCategory('خمارات',this)">خمارات</div>
<div class="categoryBox" onclick="filterCategory('شنط',this)">شنط</div>
<div class="categoryBox" onclick="filterCategory('دريسات',this)">دريسات</div>
<div class="categoryBox" onclick="filterCategory('اسدالات',this)">اسدالات</div>
</div>

<div class="products" id="products"></div>

</div>

<!-- صفحة المنتج -->
<div class="productPage" id="productPage">

<button class="backBtn" onclick="backHome()">⬅ رجوع</button>

<img id="pImg">
<h2 id="pName"></h2>
<p id="pDesc"></p>

<div id="pPrice"></div>
<div id="pOldPrice" class="oldPrice"></div>
<div id="pDiscount" class="discountText"></div>

<div class="qtyBox">
<button onclick="minusQty()">-</button>
<div id="qty">1</div>
<button onclick="plusQty()">+</button>
</div>

<input id="customerName" placeholder="اسم العميل" style="width:100%;margin-top:10px;padding:10px;">
<input id="customerPhone" placeholder="رقم الفون" style="width:100%;margin-top:10px;padding:10px;">
<input id="customerAddress" placeholder="العنوان" style="width:100%;margin-top:10px;padding:10px;">

<button class="orderBtn" onclick="sendToWhatsApp()">إرسال الطلب</button>

</div>

<!-- أزرار -->
<div class="addBtn" onclick="addProduct()">+</div>
<div class="deleteBtn" onclick="deleteProduct()">🗑️</div>

<script>

let products=JSON.parse(localStorage.getItem("products")||"[]");
let selectedCategory="all";
let selectedProduct={};
let quantity=1;

/* عرض المنتجات */
function showProducts(){
let box="";
products.forEach((p,i)=>{
if(selectedCategory!=="all" && p.category!==selectedCategory) return;

let discount=p.oldPrice?Math.round((p.oldPrice-p.price)/p.oldPrice*100):null;

box+=`
<div class="product" onclick="openProduct(${i})">
${discount?`<div class="discount">${discount}%</div>`:""}
<img src="${p.img}">
<h4>${p.name}</h4>
<div><b>${p.price} ريال</b></div>
</div>`;
});
document.getElementById("products").innerHTML=box;
}
showProducts();

/* فلتر */
function filterCategory(cat,el){
selectedCategory=cat;
document.querySelectorAll(".categoryBox").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
showProducts();
}

/* فتح المنتج */
function openProduct(i){
selectedProduct=products[i];
quantity=1;

document.getElementById("mainPage").style.display="none";
document.getElementById("productPage").style.display="block";

document.getElementById("pImg").src=selectedProduct.img;
document.getElementById("pName").innerText=selectedProduct.name;
document.getElementById("pDesc").innerText=selectedProduct.description||"";

document.getElementById("pPrice").innerText=selectedProduct.price+" ريال";

if(selectedProduct.oldPrice){
document.getElementById("pOldPrice").innerText=selectedProduct.oldPrice+" ريال";
let discount=Math.round((selectedProduct.oldPrice-selectedProduct.price)/selectedProduct.oldPrice*100);
document.getElementById("pDiscount").innerText="خصم "+discount+"%";
}else{
document.getElementById("pOldPrice").innerText="";
document.getElementById("pDiscount").innerText="";
}

document.getElementById("qty").innerText=quantity;
}

/* رجوع */
function backHome(){
document.getElementById("productPage").style.display="none";
document.getElementById("mainPage").style.display="block";
}

/* كمية */
function plusQty(){quantity++;document.getElementById("qty").innerText=quantity;}
function minusQty(){if(quantity>1){quantity--;document.getElementById("qty").innerText=quantity;}}

/* إضافة منتج */
function addProduct(){
let pass=prompt("كلمة السر:");
if(pass!=="esraa2026") return;

let name=prompt("اسم المنتج:");
let desc=prompt("الوصف:");
let price=prompt("السعر:");
let oldPrice=prompt("السعر قبل الخصم:");
let category=prompt("القسم:");
let img=prompt("رابط الصورة:");

products.push({name,description:desc,price,oldPrice,category,img});
localStorage.setItem("products",JSON.stringify(products));
showProducts();
}

/* حذف */
function deleteProduct(){
let pass=prompt("كلمة السر:");
if(pass!=="esraa2026") return;

let list="";
products.forEach((p,i)=>list+=`${i+1}- ${p.name}\n`);
let choice=parseInt(prompt(list))-1;

if(choice>=0){
products.splice(choice,1);
localStorage.setItem("products",JSON.stringify(products));
showProducts();
}
}

/* واتساب */
function sendToWhatsApp(){

let name=document.getElementById("customerName").value;
let phone=document.getElementById("customerPhone").value;
let address=document.getElementById("customerAddress").value;

if(!name||!phone||!address){
alert("اكتبي كل البيانات");
return;
}

let msg=
"طلب جديد 💖\n\n"+
"الاسم: "+name+"\n"+
"الفون: "+phone+"\n"+
"العنوان: "+address+"\n\n"+
"المنتج: "+selectedProduct.name+"\n"+
"السعر: "+selectedProduct.price+"\n"+
"الكمية: "+quantity+"\n\n"+
"💳 رقم الحساب:\n503068436001\n\n"+
"⚠️ ابعتي صورة التحويل على واتساب بعد الدفع";

window.open("https://wa.me/201091007426?text="+encodeURIComponent(msg));

}

</script>

</body>
  </html>
