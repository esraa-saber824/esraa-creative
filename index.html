<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر إسراء - كل اللي تحتاجيه في مكان واحد</title><style>
body{margin:0;font-family:Arial;background:#ffffff;color:#222;padding-bottom:90px;}
header{background:white;padding:16px;text-align:center;font-size:20px;font-weight:bold;border-bottom:1px solid #eee;}

.searchBox{padding:15px;background:white;border-bottom:1px solid #eee;}
.searchBox input{width:100%;padding:12px;border:none;border-radius:12px;font-size:16px;background:#f5f5f5;}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;padding:14px;}
.product{background:white;border-radius:12px;padding:10px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.06);position:relative;}
.product img{width:100%;border-radius:10px;}

.cartIcon{
position:absolute;
top:10px;
right:10px;
background:#ff3b5c;
color:white;
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
}

.price{color:#ff3b5c;font-size:18px;font-weight:bold;margin-top:8px;}
.free{font-size:14px;color:#ff3b5c;font-weight:bold;margin-top:6px;}

.cartCount{
position:absolute;
top:-5px;
left:-5px;
background:black;
color:white;
font-size:12px;
width:20px;
height:20px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.bottomNav{position:fixed;bottom:0;left:0;width:100%;background:white;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:10px 0;}
.navItem{text-align:center;font-size:13px;color:#444;cursor:pointer;position:relative;}
.navIcon{font-size:20px;display:block;margin-bottom:4px;}

.cartItem{padding:15px;border-bottom:1px solid #eee;display:flex;gap:12px;align-items:center;}
.cartItem img{width:70px;height:70px;border-radius:10px;object-fit:cover;}
.deleteBtn{background:#ff3b5c;color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;margin-top:5px;}
.quantityBox{display:flex;align-items:center;gap:5px;margin-top:5px;}
.qtyBtn{background:#eee;border:none;padding:5px 8px;border-radius:6px;cursor:pointer;font-weight:bold;}
.totalBox{padding:15px;font-size:18px;font-weight:bold;display:flex;justify-content:space-between;border-top:1px solid #eee;}
.orderBtn{position:fixed;bottom:70px;left:0;width:100%;background:#ff3b5c;color:white;padding:14px;border:none;font-size:16px;font-weight:bold;}

.bankBox{padding:20px;text-align:center;}
.bankImg{width:90%;border-radius:12px;margin-top:15px;}
.sendBtn{background:#25D366;color:white;border:none;padding:14px;width:100%;border-radius:12px;font-size:16px;font-weight:bold;margin-top:15px;}
.inputBox{padding:0 20px;margin-top:15px;}
.inputBox input{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:8px;}
</style></head><body>
<header>متجر إسراء 🤍</header>
<div id="homePage">
<div class="searchBox">
<input type="text" id="searchInput" placeholder="ابحثي عن المنتج..." onkeyup="searchProducts()">
</div>
<div class="products" id="products"></div>
</div><div class="bottomNav">
<div class="navItem" onclick="showHome()">
<span class="navIcon">🏬</span>
المتجر
</div>
<div class="navItem" onclick="showCart()">
<span class="navIcon">👜</span>
<span class="cartCount" id="cartCount">0</span>
حقيبة التسوق
</div>
</div><script>
let products = JSON.parse(localStorage.getItem("products") || "[]");
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function updateCartCount(){
document.getElementById("cartCount").innerText = cart.length;
}

function showProducts(){
let box = "";
let searchValue = document.getElementById("searchInput").value.toLowerCase();
products.forEach((p,index)=>{
if(!p.name.toLowerCase().includes(searchValue)) return;
box += `<div class="product">
<div class="cartIcon" onclick="addToCart(${index})">🛒</div>
<img src="${p.img1}">
<h4>${p.name}</h4>
<div class="price">${p.price} ريال</div>
<div class="free">شحن مجاني</div>
</div>`;
});
document.getElementById("products").innerHTML = box;
updateCartCount();
}
showProducts();
function searchProducts(){showProducts();}

function addToCart(index){
cart.push({...products[index], qty:1});
localStorage.setItem("cart", JSON.stringify(cart));
updateCartCount();
alert("تم إضافة المنتج إلى السلة 👜");
}

function showCart(){
let html = "<h2 style='padding:20px'>حقيبة التسوق 👜</h2>";
let total = 0;
cart.forEach((p,i)=>{
 total += Number(p.price) * p.qty;
 html += `<div class="cartItem">
<img src="${p.img1}">
<div>
<h4>${p.name}</h4>
<div style="color:#ff3b5c;font-weight:bold">${p.price} ريال</div>
<div class="quantityBox">
<button class="qtyBtn" onclick="changeQty(${i},-1)">-</button>
<span>${p.qty}</span>
<button class="qtyBtn" onclick="changeQty(${i},1)">+</button>
</div>
<button class="deleteBtn" onclick="removeFromCart(${i})">حذف المنتج</button>
</div>
</div>`;
});
html += `<div class="totalBox"><span>عدد المنتجات: ${cart.length}</span><span>الإجمالي: ${total} ريال</span></div>`;
html += `<div class="inputBox">
<input type='text' id='custName' placeholder='اسم العميل'>
<input type='text' id='custPhone' placeholder='رقم الهاتف'>
<input type='text' id='custAddress' placeholder='العنوان'>
</div>`;
html += `<button class="orderBtn" onclick="goToBankTransfer(${total})">إتمام الطلب</button>`;
document.getElementById("homePage").innerHTML = html;
updateCartCount();
}

function changeQty(index,delta){
cart[index].qty += delta;
if(cart[index].qty<1) cart[index].qty=1;
localStorage.setItem("cart", JSON.stringify(cart));
showCart();
}

function removeFromCart(index){
cart.splice(index,1);
localStorage.setItem("cart", JSON.stringify(cart));
showCart();
}

function goToBankTransfer(total){
let name = document.getElementById('custName').value || '---';
let phone = document.getElementById('custPhone').value || '---';
let address = document.getElementById('custAddress').value || '---';

let message = `طلب جديد:%0Aالاسم: ${name}%0Aرقم الهاتف: ${phone}%0Aالعنوان: ${address}%0A`;
cart.forEach(p=>{
 message += `- ${p.name} (الكمية: ${p.qty}) - ${p.price} ريال%0A`;
});
message += `%0Aعدد المنتجات: ${cart.length}%0Aالإجمالي: ${total} ريال`;
localStorage.setItem("orderMessage", message);

let html = `<div class="bankBox">
<h2>صورة التحويل البنكي</h2>
<p>اعملي التحويل وابعتي صورة التحويل على واتساب</p>
<img class="bankImg" src="PUT-YOUR-BANK-IMAGE-HERE.png">
<button class="sendBtn" onclick="sendWhatsAppOrder()">إرسال الطلب على واتساب</button>
</div>`;
document.getElementById("homePage").innerHTML = html;
}

function sendWhatsAppOrder(){
let msg = localStorage.getItem("orderMessage");
window.open("https://wa.me/201091007426?text=" + msg);
}

function showHome(){location.reload();}
</script></body>
</html>
<!-- بداية قسم المنتجات -->
<div id="product-container" style="display:flex; flex-wrap: wrap; gap: 20px;"></div>

<!-- نموذج إضافة منتج -->
<div style="margin-top: 20px; border:1px solid #ccc; padding:10px;">
  <input id="productName" placeholder="اسم المنتج" /><br/><br/>
  <input id="productDesc" placeholder="الوصف" /><br/><br/>
  <input id="productPrice" placeholder="السعر" type="number" /><br/><br/>
  <input id="productDiscount" placeholder="السعر بعد الخصم" type="number" /><br/><br/>
  <input id="productImg" placeholder="رابط الصورة" /><br/><br/>
  <button onclick="addProduct()">➕ إضافة المنتج</button>
</div>

<script>
function addProduct() {
  const name = document.getElementById('productName').value;
  const desc = document.getElementById('productDesc').value;
  const price = document.getElementById('productPrice').value;
  const discount = document.getElementById('productDiscount').value;
  const img = document.getElementById('productImg').value;

  if(!name || !img || !price) {
    alert("الرجاء إدخال الاسم، الصورة والسعر");
    return;
  }

  const container = document.getElementById('product-container');
  const productDiv = document.createElement('div');
  productDiv.style.border = "1px solid #ccc";
  productDiv.style.padding = "10px";
  productDiv.style.width = "200px";
  productDiv.style.textAlign = "center";
  
  productDiv.innerHTML = `
    <img src="${img}" alt="${name}" style="width:100%; height:150px; object-fit:cover;"/><br/>
    <h3>${name}</h3>
    <p>${desc}</p>
    <p>السعر: <span style="text-decoration:line-through">${price} ريال</span></p>
    <p>بعد الخصم: <span style="color:red">${discount || price} ريال</span></p>
  `;

  container.appendChild(productDiv);

  // مسح البيانات بعد الإضافة
  document.getElementById('productName').value = "";
  document.getElementById('productDesc').value = "";
  document.getElementById('productPrice').value = "";
  document.getElementById('productDiscount').value = "";
  document.getElementById('productImg').value = "";
}
</script>
<!-- زر + لإضافة منتج -->
<button id="addProductBtn" style="position:fixed; bottom:20px; right:20px; font-size:30px; width:60px; height:60px; border-radius:50%; background:green; color:white; border:none; cursor:pointer;">+</button>

<!-- نموذج إضافة المنتج (مخفي) -->
<div id="productFormContainer" style="display:none; position:fixed; bottom:90px; right:20px; width:300px; padding:15px; background:white; border:1px solid #ccc; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.2); z-index:1000;">
  <h3>إضافة منتج جديد</h3>
  <input type="password" id="productPassword" placeholder="كلمة السر" style="width:100%; padding:8px; margin:5px 0;">
  <input type="text" id="productName" placeholder="اسم المنتج" style="width:100%; padding:8px; margin:5px 0;">
  <input type="text" id="productPrice" placeholder="السعر بعد الخصم" style="width:100%; padding:8px; margin:5px 0;">
  <input type="text" id="productOldPrice" placeholder="السعر قبل الخصم" style="width:100%; padding:8px; margin:5px 0;">
  <input type="text" id="productImage" placeholder="رابط الصورة (PNG أو JPG)" style="width:100%; padding:8px; margin:5px 0;">
  <input type="text" id="productDescription" placeholder="وصف المنتج" style="width:100%; padding:8px; margin:5px 0;">
  <button onclick="submitProduct()" style="width:100%; padding:10px; margin-top:5px; background:green; color:white; border:none; cursor:pointer;">أضف المنتج</button>
</div>

<!-- مكان عرض المنتجات -->
<div id="productsContainer" style="display:flex; flex-wrap:wrap; gap:15px; margin-top:20px;"></div>

<script>
// كلمة السر
const secretPassword = "esraa2026";

// إظهار وإخفاء نموذج إضافة المنتج عند الضغط على +
document.getElementById('addProductBtn').addEventListener('click', () => {
  const form = document.getElementById('productFormContainer');
  form.style.display = (form.style.display === 'none') ? 'block' : 'none';
});

// إضافة المنتج
function submitProduct() {
  const password = document.getElementById('productPassword').value;
  if(password !== secretPassword){
    alert("كلمة السر غير صحيحة!");
    return;
  }

  const name = document.getElementById('productName').value;
  const price = document.getElementById('productPrice').value;
  const oldPrice = document.getElementById('productOldPrice').value;
  const image = document.getElementById('productImage').value;
  const desc = document.getElementById('productDescription').value;

  if(!name || !price || !image) {
    alert("من فضلك املأي كل الحقول المطلوبة!");
    return;
  }

  // إنشاء عنصر المنتج
  const productDiv = document.createElement('div');
  productDiv.style.width = "200px";
  productDiv.style.border = "1px solid #ddd";
  productDiv.style.borderRadius = "8px";
  productDiv.style.padding = "10px";
  productDiv.style.boxSizing = "border-box";
  productDiv.style.textAlign = "center";

  productDiv.innerHTML = `
    <img src="${image}" alt="${name}" style="width:100%; height:auto; border-radius:6px;">
    <h4>${name}</h4>
    <p><span style="text-decoration:line-through; color:red;">${oldPrice}</span> <span style="color:green; font-weight:bold;">${price}</span></p>
    <p style="font-size:14px;">${desc}</p>
  `;

  document.getElementById('productsContainer').appendChild(productDiv);

  // مسح الحقول
  document.getElementById('productName').value = '';
  document.getElementById('productPrice').value = '';
  document.getElementById('productOldPrice').value = '';
  document.getElementById('productImage').value = '';
  document.getElementById('productDescription').value = '';
  document.getElementById('productPassword').value = '';

  // إخفاء النموذج بعد الإضافة
  document.getElementById('productFormContainer').style.display = 'none';
}
</script>
