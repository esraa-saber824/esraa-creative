<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esraa creative</title>
<style>
body{margin:0;font-family:Arial;background:#fff;padding-bottom:180px;}
header{background:white;padding:16px;text-align:center;font-size:20px;font-weight:bold;border-bottom:1px solid #eee;}

/* الأقسام */
.categories{display:flex;overflow-x:auto;gap:10px;padding:10px;background:#fafafa;}
.categoryBox{padding:8px 14px;background:white;border:1px solid #eee;border-radius:20px;cursor:pointer;white-space:nowrap;}
.categoryBox.active{background:black;color:white;}

/* المنتجات */
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;padding:12px;}
.product{background:white;border-radius:12px;padding:10px;box-shadow:0 0 8px rgba(0,0,0,0.05);cursor:pointer;position:relative;}
.product img{width:100%;border-radius:10px;}
.product h4{margin:8px 0 4px;font-size:15px;}
.product p{font-size:13px;color:#555;margin:2px 0;}
.price{font-weight:bold;}
.oldPrice{text-decoration:line-through;color:#888;font-size:13px;}
.discount{position:absolute;top:10px;right:10px;background:red;color:white;padding:4px 8px;font-size:12px;border-radius:6px;}

/* إضافة وحذف وتعديل المنتجات */
.addBtn,.deleteBtn,.editBtn{
position:fixed;right:15px;width:45px;height:45px;border-radius:50%;
display:flex;align-items:center;justify-content:center;color:white;cursor:pointer;
font-size:20px;text-align:center;
}
.addBtn{bottom:90px;background:#25D366;}
.deleteBtn{bottom:150px;background:red;}
.editBtn{bottom:210px;background:#FF9900;}

/* صفحة المنتج */
.productPage{display:none;padding:15px;}
.productPage img{width:100%;border-radius:12px;margin-bottom:10px;}
.qtyBox{display:flex;gap:10px;margin-top:10px;justify-content:center;align-items:center;}
.qtyBox button{width:35px;height:35px;background:black;color:white;border:none;border-radius:8px;}
#qty{min-width:20px;text-align:center;font-weight:bold;}
.orderBtn{margin-top:15px;width:100%;background:#25D366;color:white;padding:12px;border:none;border-radius:10px;}

/* إدخالات العميل */
.productPage input{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd;}
</style>
</head>
<body>

<header>Esraa creative 💖</header>

<!-- الأقسام -->
<div class="categories">
<div class="categoryBox active" onclick="filterCategory('all',this)">الكل</div>
<div class="categoryBox" onclick="filterCategory('تريندات',this)">تريندات</div>
<div class="categoryBox" onclick="filterCategory('هاند ميد',this)">هاند ميد</div>
<div class="categoryBox" onclick="filterCategory('عبايات',this)">عبايات</div>
<div class="categoryBox" onclick="filterCategory('خمارات',this)">خمارات</div>
<div class="categoryBox" onclick="filterCategory('الشنط',this)">الشنط</div>
<div class="categoryBox" onclick="filterCategory('دريسات',this)">دريسات</div>
<div class="categoryBox" onclick="filterCategory('فوانيس',this)">فوانيس</div>
</div>

<!-- المنتجات -->
<div class="products" id="products"></div>

<!-- صفحة المنتج المنفصلة -->
<div class="productPage" id="productPage">
<img id="pImg">
<h3 id="pName"></h3>
<p id="pDesc"></p>
<div id="pPrice"></div>
<div id="pOldPrice" style="text-decoration:line-through;color:#888;margin-bottom:5px;"></div>

<div class="qtyBox">
<button onclick="minusQty()">-</button>
<div id="qty">1</div>
<button onclick="plusQty()">+</button>
</div>

<input id="customerName" placeholder="اسم العميل">
<input id="customerPhone" placeholder="رقم الفون">
<input id="customerAddress" placeholder="العنوان بالكامل">

<label>رفع صورة التحويل</label>
<input type="file" id="bankImage">
<img id="previewImage" style="width:100%;display:none;margin-top:10px;">

<button class="orderBtn" onclick="sendToWhatsApp()">إرسال الطلب على واتساب</button>
<button onclick="backToMain()" style="margin-top:10px;width:100%;padding:10px;">⬅ العودة للمتجر</button>
</div>

<!-- أزرار الإدارة -->
<div class="addBtn" onclick="addProduct()">+</div>
<div class="deleteBtn" onclick="deleteProduct()">🗑️</div>
<div class="editBtn" onclick="editProduct()">✏️</div>

<script>
let products=JSON.parse(localStorage.getItem("products")||"[]");
let selectedCategory="all";
let selectedProduct={};
let selectedIndex=null;
let quantity=1;

/* عرض المنتجات */
function showProducts(){
let box="";
products.forEach((p,i)=>{
if(selectedCategory!=="all" && p.category!==selectedCategory) return;
let discount=p.oldPrice?Math.round((p.oldPrice-p.price)/p.oldPrice*100):null;
box+=`
<div class="product" onclick="openProduct(${i})">
${discount?`<div class="discount">${discount}%</div>`:""}
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.description||''}</p>
<div class="price">${p.price} ريال</div>
${p.oldPrice?`<div class="oldPrice">${p.oldPrice} ريال</div>`:""}
</div>`;
});
document.getElementById("products").innerHTML=box;
}
showProducts();

/* فلترة الأقسام */
function filterCategory(cat,el){
selectedCategory=cat;
document.querySelectorAll(".categoryBox").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
showProducts();
}

/* فتح صفحة المنتج */
function openProduct(i){
selectedProduct=products[i];
selectedIndex=i;
quantity=1;
document.getElementById("pImg").src=selectedProduct.img;
document.getElementById("pName").innerText=selectedProduct.name;
document.getElementById("pDesc").innerText=selectedProduct.description||'لا يوجد وصف متاح';
document.getElementById("pPrice").innerText=selectedProduct.price+" ريال";
document.getElementById("pOldPrice").innerText=selectedProduct.oldPrice?selectedProduct.oldPrice+" ريال":"";
document.getElementById("qty").innerText=quantity;
document.getElementById("productPage").style.display="block";
window.scrollTo(0,0);
document.getElementById("previewImage").style.display="none";
document.getElementById("bankImage").value="";
}

/* العودة للمتجر */
function backToMain(){document.getElementById("productPage").style.display="none";}

/* تعديل الكمية */
function plusQty(){quantity++;document.getElementById("qty").innerText=quantity;}
function minusQty(){if(quantity>1){quantity--;document.getElementById("qty").innerText=quantity;}}

/* عرض صورة التحويل */
document.getElementById("bankImage").onchange=function(){
let file=this.files[0];
if(file){
let reader=new FileReader();
reader.onload=e=>{
document.getElementById("previewImage").src=e.target.result;
document.getElementById("previewImage").style.display="block";
};
reader.readAsDataURL(file);
}
}

/* إرسال الطلب على واتساب */
function sendToWhatsApp(){
let name=document.getElementById("customerName").value;
let phone=document.getElementById("customerPhone").value;
let address=document.getElementById("customerAddress").value;
if(!name||!phone||!address){alert("اكتبي كل البيانات");return;}
let msg=`طلب جديد 💖\n\nالاسم: ${name}\nرقم الفون: ${phone}\nالعنوان: ${address}\n\nالمنتج: ${selectedProduct.name}\nالسعر: ${selectedProduct.price} ريال\nالكمية: ${quantity}\n\nتم التحويل، برجاء إرسال صورة التحويل على رقم الحساب 503068436001`;
window.open("https://wa.me/201091007426?text="+encodeURIComponent(msg));
alert("تم إرسال الطلب بنجاح 💖"); backToMain();
}

/* إضافة منتج */
function addProduct(){
let pass=prompt("كلمة السر:");
if(pass!=="esraa2026") return alert("كلمة السر غلط");
let name=prompt("اسم المنتج:");
let description=prompt("وصف المنتج:");
let price=prompt("السعر:");
let oldPrice=prompt("السعر قبل الخصم:");
let category=prompt("القسم: تريندات / هاند ميد / عبايات / خمارات / الشنط / دريسات / فوانيس");
let img=prompt("رابط الصورة:");
if(!name||!price||!img||!category) return alert("من فضلك أكمل كل البيانات");
products.push({name,description,price:Number(price),oldPrice:oldPrice?Number(oldPrice):null,category,img});
localStorage.setItem("products",JSON.stringify(products));
showProducts();
alert("تمت الإضافة بنجاح ✨");
}

/* حذف منتج */
function deleteProduct(){
let pass=prompt("كلمة السر:");
if(pass!=="esraa2026") return alert("كلمة السر غلط");
let list="";
products.forEach((p,i)=>list+=`${i+1}- ${p.name}\n`);
let choice=parseInt(prompt(list))-1;
if(choice>=0){
products.splice(choice,1);
localStorage.setItem("products",JSON.stringify(products));
showProducts();
alert("تم حذف المنتج بنجاح 🗑️");
}
}

/* تعديل منتج */
function editProduct(){
let pass=prompt("كلمة السر:");
if(pass!=="esraa2026") return alert("كلمة السر غلط");
let list="";
products.forEach((p,i)=>list+=`${i+1}- ${p.name}\n`);
let choice=parseInt(prompt(list))-1;
if(choice>=0){
let p=products[choice];
p.name=prompt("اسم المنتج:",p.name);
p.description=prompt("وصف المنتج:",p.description);
p.price=Number(prompt("السعر:",p.price));
let old=prompt("السعر قبل الخصم:",p.oldPrice);
p.oldPrice=old?Number(old):null;
p.category=prompt("القسم:",p.category);
p.img=prompt("رابط الصورة:",p.img);
products[choice]=p;
localStorage.setItem("products",JSON.stringify(products));
showProducts();
alert("تم تعديل المنتج ✏️");
}
}
</script>

</body>
</html>
