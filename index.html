<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esraa creative</title>

<style>
body{margin:0;font-family:Arial;background:#fff;padding-bottom:120px;}
header{background:white;padding:15px;text-align:center;font-size:20px;font-weight:bold;border-bottom:1px solid #eee;}

.categories{display:flex;overflow-x:auto;gap:10px;padding:10px;background:#fafafa;}
.categoryBox{padding:8px 14px;background:white;border:1px solid #eee;border-radius:20px;cursor:pointer;}
.categoryBox.active{background:black;color:white;}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:12px;}
.product{background:white;border-radius:12px;padding:10px;box-shadow:0 0 8px rgba(0,0,0,0.05);cursor:pointer;position:relative;}
.product img{width:100%;border-radius:10px;}
.product h4{margin:8px 0 5px;font-size:15px;}
.product p{font-size:13px;color:#555;}

.discount{position:absolute;top:10px;right:10px;background:red;color:white;padding:4px 8px;font-size:12px;border-radius:6px;}
.oldPrice{text-decoration:line-through;color:#888;font-size:13px;}
.price{font-weight:bold;}

.addBtn,.deleteBtn{
position:fixed;right:15px;width:45px;height:45px;border-radius:50%;
display:flex;align-items:center;justify-content:center;color:white;cursor:pointer;
}
.addBtn{bottom:90px;background:black;}
.deleteBtn{bottom:150px;background:red;}

.productPage{display:none;padding:15px;}
.productPage img{width:100%;border-radius:12px;margin-bottom:10px;}
.qtyBox{display:flex;gap:10px;margin-top:10px;}
.qtyBox button{width:35px;height:35px;background:black;color:white;border:none;border-radius:8px;}
.orderBtn{margin-top:15px;width:100%;background:#25D366;color:white;padding:12px;border:none;border-radius:10px;}
</style>
</head>

<body>

<header>Esraa creative 💖</header>

<div class="categories">
<div class="categoryBox active" onclick="filterCategory('all',this)">الكل</div>
<div class="categoryBox" onclick="filterCategory('تريندات',this)">تريندات</div>
<div class="categoryBox" onclick="filterCategory('هاند ميد',this)">هاند ميد</div>
<div class="categoryBox" onclick="filterCategory('عبايات',this)">عبايات</div>
<div class="categoryBox" onclick="filterCategory('خمارات',this)">خمارات</div>
<div class="categoryBox" onclick="filterCategory('الشنط',this)">الشنط</div>
<div class="categoryBox" onclick="filterCategory('دريسات',this)">دريسات</div>
<div class="categoryBox" onclick="filterCategory('فوانيس',this)">فوانيس</div>
</div>

<div class="products" id="products"></div>

<!-- صفحة المنتج المنفصلة -->
<div class="productPage" id="productPage">
<img id="pImg">
<h3 id="pName"></h3>
<p id="pDesc"></p>
<div id="pPrice"></div>
<div id="pOldPrice" style="text-decoration:line-through;color:#888;margin-bottom:5px;"></div>

<div class="qtyBox">
<button onclick="minusQty()">-</button>
<div id="qty">1</div>
<button onclick="plusQty()">+</button>
</div>

<input id="customerName" placeholder="اسم العميل">
<input id="customerPhone" placeholder="رقم الفون">
<input id="customerAddress" placeholder="العنوان بالكامل">

<!-- زر ارسال الطلب على واتساب -->
<button class="orderBtn" onclick="sendToWhatsApp()">إرسال الطلب على واتساب</button>
<button onclick="backToMain()" style="margin-top:10px;width:100%;padding:10px;">⬅ العودة للمتجر</button>
</div>

<div class="addBtn" onclick="addProduct()">+</div>
<div class="deleteBtn" onclick="deleteProduct()">🗑️</div>

<script>
let products=JSON.parse(localStorage.getItem("products")||"[]");
let selectedCategory="all";
let selectedProduct={};
let quantity=1;

/* عرض المنتجات */
function showProducts(){
let box="";
products.forEach(p=>{
if(selectedCategory!=="all" && p.category!==selectedCategory) return;
let discount=p.oldPrice?Math.round((p.oldPrice-p.price)/p.oldPrice*100):null;
box+=`
<div class="product" onclick="openProduct('${p.name}','${p.price}','${p.oldPrice}','${p.img}','${p.description || ''}')">
${discount?`<div class="discount">${discount}%</div>`:""}
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.description || ''}</p>
<div class="price">${p.price} ريال</div>
${p.oldPrice?`<div class="oldPrice">${p.oldPrice} ريال</div>`:""}
</div>`;
});
document.getElementById("products").innerHTML=box;
}
showProducts();

/* فلترة الأقسام */
function filterCategory(cat,el){
selectedCategory=cat;
document.querySelectorAll(".categoryBox").forEach(c=>c.classList.remove("active"));
el.classList.add("active");
showProducts();
}

/* إضافة منتج */
function addProduct(){
let pass=prompt("كلمة السر:");
if(pass!=="esraa2026") return;
let name=prompt("اسم المنتج:");
let price=prompt("السعر:");
let oldPrice=prompt("السعر قبل الخصم:");
let category=prompt("اختاري رقم:\n1 تريندات\n2 هاند ميد\n3 عبايات\n4 خمارات\n5 الشنط\n6 دريسات\n7 فوانيس");
if(category=="1") category="تريندات";
if(category=="2") category="هاند ميد";
if(category=="3") category="عبايات";
if(category=="4") category="خمارات";
if(category=="5") category="الشنط";
if(category=="6") category="دريسات";
if(category=="7") category="فوانيس";
let img=prompt("رابط الصورة:");
let description=prompt("وصف المنتج:");
products.push({name,price,oldPrice,category,img,description});
localStorage.setItem("products",JSON.stringify(products));
showProducts();
}

/* حذف منتج */
function deleteProduct(){
let pass=prompt("كلمة السر:");
if(pass!=="esraa2026") return;
let list="";
products.forEach((p,i)=>list+=`${i+1}- ${p.name}\n`);
let choice=parseInt(prompt(list))-1;
if(choice>=0){
products.splice(choice,1);
localStorage.setItem("products",JSON.stringify(products));
showProducts();
}
}

/* فتح المنتج */
function openProduct(name,price,oldPrice,img,description){
selectedProduct={name,price,oldPrice,img,description};
quantity=1;
document.getElementById("pImg").src=img;
document.getElementById("pName").innerText=name;
document.getElementById("pDesc").innerText=description;
document.getElementById("pPrice").innerText=price+" ريال";
document.getElementById("pOldPrice").innerText=oldPrice?oldPrice+" ريال":"";
document.getElementById("productPage").style.display="block";
window.scrollTo(0,0);
}

/* العودة للمتجر */
function backToMain(){
document.getElementById("productPage").style.display="none";
window.scrollTo(0,0);
}

/* كمية */
function plusQty(){quantity++;document.getElementById("qty").innerText=quantity;}
function minusQty(){if(quantity>1){quantity--;document.getElementById("qty").innerText=quantity;}}

/* إرسال الطلب على واتساب */
function sendToWhatsApp(){
let name=document.getElementById("customerName").value;
let phone=document.getElementById("customerPhone").value;
let address=document.getElementById("customerAddress").value;
if(!name||!phone||!address){alert("من فضلك املئي كل البيانات"); return;}

let msg=
`طلب جديد 💖
الاسم: ${name}
الفون: ${phone}
العنوان: ${address}

المنتج: ${selectedProduct.name}
السعر بعد الخصم: ${selectedProduct.price} ريال
${selectedProduct.oldPrice?`السعر قبل الخصم: ${selectedProduct.oldPrice} ريال`:""}
الكمية: ${quantity}

✅ تم التحويل
👉 برجاء إرسال صورة التحويل على رقم الحساب: 503068436001`;

window.open("https://wa.me/201091007426?text="+encodeURIComponent(msg));
alert("تم إرسال الطلب بنجاح 💖");
}
</script>

</body>
</html>
