<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر خرز أنتيكات</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white;}

header{
background:black;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.categories{
display:flex;
gap:10px;
overflow:auto;
padding:15px;
background:#111;
}

.categories button{
background:#1a1a1a;
color:white;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.categories button:hover{background:#00ff9c;color:black;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.product{
background:#1a1a1a;
border-radius:15px;
padding:15px;
text-align:center;
}

.product img{width:100%;border-radius:10px;margin-bottom:8px;}

.price{color:#00ff9c;font-size:18px;margin:8px 0;}

button{
background:#00ff9c;
color:black;
border:none;
padding:10px;
width:100%;
border-radius:8px;
margin-top:6px;
cursor:pointer;
font-weight:bold;
}

.cart{
position:fixed;
top:15px;
right:15px;
background:#00ff9c;
color:black;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.addBtn{
position:fixed;
bottom:90px;
right:20px;
background:#007bff;
color:white;
padding:14px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px 16px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

.formBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:6px;
}

.checkout{display:none;padding:20px;}
</style>
</head>

<body>

<header>متجر خرز أنتيكات</header>

<div class="categories">
<button onclick="filter('all')">كل المنتجات</button>
<button onclick="filter('بيانو')">بيانو خرز</button>
<button onclick="filter('جامع')">جامع خرز</button>
<button onclick="filter('انتيكات')">أنتيكات خرز</button>
<button onclick="filter('جديد')">منتجات جديدة</button>
</div>

<div class="cart" onclick="openCheckout()">السلة (<span id="cartCount">0</span>)</div>

<div class="products" id="products"></div>

<div class="addBtn" onclick="openLogin()">+</div>

<a class="whatsapp" href="https://wa.me/201000000000">واتساب</a>

<!-- تسجيل دخول الادمن -->
<div class="formBox" id="loginBox">
<h3>كلمة السر</h3>
<input type="password" id="pass">
<button onclick="login()">دخول</button>
</div>

<!-- إضافة منتج -->
<div class="formBox" id="addBox">
<h3>إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر بالريال">

<select id="category">
<option value="بيانو">بيانو خرز</option>
<option value="جامع">جامع خرز</option>
<option value="انتيكات">أنتيكات خرز</option>
<option value="جديد">منتج جديد</option>
</select>

<input id="img1" placeholder="رابط الصورة 1">
<input id="img2" placeholder="رابط الصورة 2">
<input id="video" placeholder="رابط الفيديو (اختياري)">

<button onclick="addProduct()">إضافة المنتج</button>
</div>

<!-- صفحة الدفع -->
<div class="checkout" id="checkout">
<h2>إتمام الطلب</h2>

<input id="custName" placeholder="الاسم بالكامل">
<input id="custPhone" placeholder="رقم الهاتف">
<input id="custAddress" placeholder="العنوان بالكامل">

<button onclick="cashOrder()">الدفع عند الاستلام</button>

<br><br>

<h3>الدفع بالتحويل البنكي</h3>

<div style="background:#1a1a1a;padding:15px;border-radius:10px">
<p>اسم البنك: بنك الإسكندرية</p>
<p>اسم صاحب الحساب: Esraa Saber</p>
<p>رقم الحساب: 503068436001</p>
<p>بعد التحويل ابعتي صورة التحويل على واتساب لتأكيد الطلب</p>
</div>

<button onclick="bankTransfer()">تم التحويل</button>
</div>

<script>

let password = "esraa2026";
let products = JSON.parse(localStorage.getItem("products") || "[]");
let cart = [];
let currentFilter = "all";

function showProducts(){
let box = "";

products.forEach((p,index)=>{

if(currentFilter !== "all" && p.category !== currentFilter) return;

box += `
<div class="product">
<img src="${p.img1}">
<h3>${p.name}</h3>
<div class="price">${p.price} ريال</div>
<p>${p.category}</p>

<button onclick="viewProduct(${index})">عرض المنتج</button>
<button onclick="deleteProduct(${index})">حذف المنتج</button>
</div>`;
});

document.getElementById("products").innerHTML = box;
document.getElementById("cartCount").innerText = cart.length;
}

showProducts();

function filter(cat){
currentFilter = cat;
showProducts();
}

function openLogin(){
document.getElementById("loginBox").style.display="block";
}

function login(){
let userPass = document.getElementById("pass").value;
if(userPass === password){
document.getElementById("loginBox").style.display="none";
document.getElementById("addBox").style.display="block";
}else{
alert("كلمة السر غلط");
}
}

function addProduct(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let category = document.getElementById("category").value;
let img1 = document.getElementById("img1").value;
let img2 = document.getElementById("img2").value;
let video = document.getElementById("video").value;

products.push({name,price,category,img1,img2,video});
localStorage.setItem("products", JSON.stringify(products));

showProducts();
document.getElementById("addBox").style.display="none";
}

function deleteProduct(index){
let pass = prompt("اكتبي كلمة السر");
if(pass === password){
products.splice(index,1);
localStorage.setItem("products", JSON.stringify(products));
showProducts();
}else{
alert("كلمة السر غلط");
}
}

function viewProduct(index){
let p = products[index];

document.body.innerHTML = `
<header>${p.name}</header>

<div style="padding:20px">
<img src="${p.img1}" style="width:100%">
${p.img2 ? `<img src="${p.img2}" style="width:100%;margin-top:10px">` : ""}
<h2>${p.name}</h2>
<div class="price">${p.price} ريال</div>
<p>${p.category}</p>

${p.video ? `<video controls style="width:100%;margin-top:10px;"><source src="${p.video}"></video>` : ""}

<button onclick="addToCart(${index})">اضافة للسلة</button>
<button onclick="goBack()">رجوع للمتجر</button>
</div>`;
}

function goBack(){location.reload();}

function addToCart(index){
cart.push(products[index]);
document.getElementById("cartCount").innerText = cart.length;
}

function openCheckout(){
document.getElementById("products").style.display="none";
document.getElementById("checkout").style.display="block";
}

function cashOrder(){
let name = document.getElementById("custName").value;
let phone = document.getElementById("custPhone").value;
let address = document.getElementById("custAddress").value;

if(!name || !phone || !address){alert("اكتبي كل البيانات");return;}

let message = "طلب جديد من الموقع%0A";

cart.forEach(p=>{
message += p.name + " - " + p.price + " ريال%0A";
});

message += "%0Aالاسم: " + name;
message += "%0Aرقم الهاتف: " + phone;
message += "%0Aالعنوان: " + address;
message += "%0Aطريقة الدفع: عند الاستلام";

window.open("https://wa.me/201000000000?text="+message);
}

function bankTransfer(){
let name = document.getElementById("custName").value;
let phone = document.getElementById("custPhone").value;
let address = document.getElementById("custAddress").value;

if(!name || !phone || !address){alert("اكتبي كل البيانات");return;}

let message = "طلب جديد من الموقع%0A";

cart.forEach(p=>{
message += p.name + " - " + p.price + " ريال%0A";
});

message += "%0Aالاسم: " + name;
message += "%0Aرقم الهاتف: " + phone;
message += "%0Aالعنوان: " + address;
message += "%0Aطريقة الدفع: تحويل بنكي";

window.open("https://wa.me/201000000000?text="+message);
}

</script>

</body>
  </html>
