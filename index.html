<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esraa creative</title>
<style>
body{margin:0;font-family:Arial;background:#fff;padding-bottom:120px;}
header{background:white;padding:16px;text-align:center;font-size:20px;font-weight:bold;border-bottom:1px solid #eee;}

/* الأقسام */
.categories{display:flex;overflow-x:auto;gap:10px;padding:10px;background:#fafafa;}
.categoryBox{padding:8px 14px;background:white;border:1px solid #eee;border-radius:20px;cursor:pointer;white-space:nowrap;}
.categoryBox.active{background:black;color:white;}

/* المنتجات */
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:12px;}
.product{background:white;border-radius:12px;padding:10px;box-shadow:0 0 8px rgba(0,0,0,0.05);cursor:pointer;position:relative;}
.product img{width:100%;border-radius:10px;}
.product h4{margin:8px 0 4px;font-size:15px;font-weight:bold;}
.product p{font-size:13px;color:#555;margin:2px 0;}
.discount{position:absolute;top:10px;right:10px;background:red;color:white;padding:4px 8px;font-size:12px;border-radius:6px;}
.oldPrice{text-decoration:line-through;color:#888;font-size:13px;}
.price{font-weight:bold;font-size:14px;}

/* صفحة المنتج */
.productPage{display:none;padding:15px;}
.productPage img{width:100%;border-radius:12px;}
.productPage h3{margin:8px 0 4px;}
.productPage p{font-size:14px;color:#555;margin:4px 0;}
.qtyBox{display:flex;gap:10px;margin-top:10px;}
.qtyBox button{width:35px;height:35px;background:black;color:white;border:none;border-radius:8px;}
.orderBtn{margin-top:15px;width:100%;background:#25D366;color:white;padding:12px;border:none;border-radius:10px;}
</style>
</head>
<body>

<header>Esraa creative 💖</header>

<!-- الأقسام -->
<div class="categories">
<div class="categoryBox active" onclick="filterCategory('all',this)">الكل</div>
<div class="categoryBox" onclick="filterCategory('تريندات',this)">تريندات</div>
<div class="categoryBox" onclick="filterCategory('هاند ميد',this)">هاند ميد</div>
<div class="categoryBox" onclick="filterCategory('عبايات',this)">عبايات</div>
<div class="categoryBox" onclick="filterCategory('خمارات',this)">خمارات</div>
<div class="categoryBox" onclick="filterCategory('الشنط',this)">الشنط</div>
<div class="categoryBox" onclick="filterCategory('دريسات',this)">دريسات</div>
<div class="categoryBox" onclick="filterCategory('فوانيس',this)">فوانيس</div>
<div class="categoryBox" onclick="filterCategory('اسدالات',this)">اسدالات</div>
</div>

<!-- عرض المنتجات -->
<div class="products" id="products"></div>

<!-- صفحة المنتج المنفصلة -->
<div class="productPage" id="productPage">
<img id="pImg">
<h3 id="pName"></h3>
<p id="pDesc"></p>
<div id="pPrice"></div>
<div class="oldPrice" id="pOldPrice"></div>

<div class="qtyBox">
<button onclick="minusQty()">-</button>
<div id="qty">1</div>
<button onclick="plusQty()">+</button>
</div>

<input id="customerName" placeholder="اسم العميل" style="width:100%;margin-top:10px;padding:10px;">
<input id="customerPhone" placeholder="رقم الفون" style="width:100%;margin-top:10px;padding:10px;">
<input id="customerAddress" placeholder="العنوان" style="width:100%;margin-top:10px;padding:10px;">

<button class="orderBtn" onclick="sendToWhatsApp()">إرسال الطلب</button>
<button class="orderBtn" onclick="backToMain()" style="background:#888;margin-top:5px;">⬅ العودة للمتجر</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")||"[]");
let selectedCategory = "all";
let selectedProduct = {};
let quantity = 1;

/* عرض المنتجات */
function showProducts(){
    let box="";
    products.forEach((p,i)=>{
        if(selectedCategory!=="all" && p.category.toLowerCase()!==selectedCategory.toLowerCase()) return;

        let discount = p.oldPrice ? Math.round((p.oldPrice - p.price)/p.oldPrice*100) : null;

        box += `
        <div class="product" onclick="openProduct(${i})">
            ${discount?`<div class="discount">خصم ${discount}%</div>`:""}
            <img src="${p.img}">
            <h4>${p.name}</h4>
            <p>${p.description || ''}</p>
            <div class="price">${p.price} ريال</div>
            ${p.oldPrice?`<div class="oldPrice">${p.oldPrice} ريال</div>`:""}
        </div>`;
    });
    document.getElementById("products").innerHTML = box;
}
showProducts();

/* فلتر الأقسام */
function filterCategory(cat,el){
    selectedCategory = cat;
    document.querySelectorAll(".categoryBox").forEach(c=>c.classList.remove("active"));
    el.classList.add("active");
    showProducts();
}

/* فتح المنتج */
function openProduct(index){
    selectedProduct = products[index];
    quantity = 1;

    document.getElementById("pImg").src = selectedProduct.img;
    document.getElementById("pName").innerText = selectedProduct.name;
    document.getElementById("pDesc").innerText = selectedProduct.description || 'لا يوجد وصف متاح';
    document.getElementById("pPrice").innerText = selectedProduct.price + " ريال";
    document.getElementById("pOldPrice").innerText = selectedProduct.oldPrice ? selectedProduct.oldPrice + " ريال" : "";
    document.getElementById("qty").innerText = quantity;

    document.getElementById("productPage").style.display = "block";
    window.scrollTo(0,0);
}

/* العودة للمتجر */
function backToMain(){
    document.getElementById("productPage").style.display = "none";
}

/* كمية */
function plusQty(){quantity++;document.getElementById("qty").innerText=quantity;}
function minusQty(){if(quantity>1){quantity--;document.getElementById("qty").innerText=quantity;}}

/* إرسال الطلب على واتساب */
function sendToWhatsApp(){
    let name=document.getElementById("customerName").value;
    let phone=document.getElementById("customerPhone").value;
    let address=document.getElementById("customerAddress").value;
    if(!name || !phone || !address){alert("من فضلك اكتبي كل البيانات"); return;}

    let discount = selectedProduct.oldPrice ? Math.round((selectedProduct.oldPrice - selectedProduct.price)/selectedProduct.oldPrice*100) : 0;
    let msg = "طلب جديد 💖\n\n";
    msg += "الاسم: "+name+"\n";
    msg += "الفون: "+phone+"\n";
    msg += "العنوان: "+address+"\n\n";
    msg += "المنتج: "+selectedProduct.name+"\n";
    msg += "السعر بعد الخصم: "+selectedProduct.price+" ريال\n";
    if(selectedProduct.oldPrice) msg += "السعر قبل الخصم: "+selectedProduct.oldPrice+" ريال\n";
    if(discount) msg += "نسبة الخصم: "+discount+"%\n";
    msg += "الكمية: "+quantity+"\n\n";
    msg += "تم التحويل – برجاء إرسال صورة التحويل على رقم الحساب: 503068436001";

    window.open("https://wa.me/201091007426?text="+encodeURIComponent(msg));
    backToMain();
}

/* إضافة منتج جديد */
function addProduct(){
    let pass=prompt("كلمة السر:");
    if(pass!=="esraa2026") return alert("كلمة السر خطأ");
    let name=prompt("اسم المنتج:");
    let price=prompt("السعر:");
    let oldPrice=prompt("السعر قبل الخصم:");
    let description=prompt("وصف المنتج:");
    let category=prompt("القسم: تريندات / هاند ميد / عبايات / خمارات / الشنط / دريسات / فوانيس / اسدالات");
    let img=prompt("رابط الصورة:");
    if(!name||!price||!category||!img) return alert("من فضلك املئي كل البيانات");

    products.push({name,price,oldPrice,description,category,img});
    localStorage.setItem("products",JSON.stringify(products));
    showProducts();
}

/* حذف منتج */
function deleteProduct(){
    let pass=prompt("كلمة السر:");
    if(pass!=="esraa2026") return alert("كلمة السر خطأ");
    let list="اختاري رقم المنتج:\n";
    products.forEach((p,i)=>list += `${i+1}- ${p.name}\n`);
    let choice=parseInt(prompt(list))-1;
    if(choice>=0){products.splice(choice,1);localStorage.setItem("products",JSON.stringify(products)); showProducts();}
}
</script>
</body>
  </html>
